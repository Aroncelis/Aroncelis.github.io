<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Advanced Search</title>
        <link rel="stylesheet" href="adstyle.css">
        <link rel="icon" href="https://www.gstatic.com/images/branding/searchlogo/ico/favicon.ico">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
            <a href="images.html" aria-label="Google Images" id="img">Google Images</a>
            <a href="index.html" aria-label="Google Search" id="search">Google Search</a>
        <div class="search-header">
            <label style="font-size:x-large;">Advanced Search</label>
        </div>
        <div class="options">
            <span>Search pages with...</span>
            <form action="https://www.google.es/search" id="search-bars">
                <div class="barras">
                    <label for="all">All of the words:</label>
                    <input type="text" name="as_q" id="all">
                </div>
                <br>
                <div class="barras">
                    <label for="exact">Exact phrase:</label>
                    <input type="text" name="as_epq" id="exact">
                </div>
                <br>
                <div class="barras">
                    <label for="any">Any of the words:</label>
                    <input type="text" name="as_oq" id="any">
                </div>
                <br>
                <div class="barras">
                    <label for="none">None of the words:</label>
                    <input type="text" name="as_eq" id="none">
                </div>
            </form>
        </div>
        <div class="search-button">
            <br>
            <input type="submit" value="Advanced Search" id="search-button" form="search-bars">
        </div>
    </body>
</html>
